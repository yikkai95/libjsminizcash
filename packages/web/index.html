<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zebugger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        fontFamily: { sans: ['Inter', 'Helvetica Neue', 'Arial', 'sans-serif'] },
        extend: {
          colors: { accent: '#e60012' },
          letterSpacing: { tight: '-0.02em', tighter: '-0.03em' }
        }
      }
    }
  </script>
  <style>
    .blur-seed { filter: blur(5px); transition: filter 0.2s; }
    .blur-seed:hover { filter: none; }
    @keyframes spin-sync { to { transform: rotate(360deg); } }
    .spin-sync { animation: spin-sync 0.8s linear infinite; }
    #tx-list a { text-decoration: none; color: inherit; }
  </style>
</head>
<body class="bg-white text-black font-sans min-h-screen flex items-start justify-center pt-[12vh] px-4 pb-8">
<div id="app" class="w-full max-w-sm">

  <!-- Header -->
  <div class="mb-10">
    <p class="text-[11px] font-medium uppercase tracking-widest text-neutral-400 mb-2">&nbsp;</p>
    <h1 class="text-4xl font-extrabold tracking-tighter leading-none">Zebugger</h1>
    <div class="w-8 h-1 bg-accent mt-4"></div>
  </div>

  <!-- Step: Login -->
  <div id="step-login" class="space-y-4">
    <p class="text-sm text-neutral-500">Sign in with your passkey to access your wallet.</p>
    <button id="btn-login"
      class="w-full bg-black text-white text-[11px] font-semibold uppercase tracking-widest py-3.5 hover:bg-neutral-800 transition-colors">
      Login with Passkey
    </button>
    <button id="btn-register"
      class="w-full text-[11px] font-semibold uppercase tracking-widest text-neutral-400 hover:text-black py-3 transition-colors">
      Create New Wallet
    </button>
    <button id="btn-show-import"
      class="w-full text-[11px] font-semibold uppercase tracking-widest text-neutral-400 hover:text-black py-1 transition-colors">
      Import Wallet
    </button>
    <p id="login-error" class="text-accent text-[11px] hidden"></p>
  </div>

  <!-- Step: Import -->
  <div id="step-import" class="space-y-4 hidden">
    <p class="text-sm text-neutral-500">Paste your 12 or 24-word seed phrase to restore your wallet.</p>
    <div>
      <textarea id="import-phrase" rows="3" placeholder="word1 word2 word3 ..."
        class="w-full border-2 border-black bg-transparent py-2 px-3 text-sm font-mono placeholder-neutral-300 focus:outline-none focus:border-accent transition-colors resize-none"></textarea>
    </div>
    <div>
      <label class="block text-[11px] font-semibold uppercase tracking-widest text-neutral-500 mb-2">Wallet Birthday Height</label>
      <input id="import-birthday" type="number" min="0" step="1" placeholder="e.g. 2000000"
        class="w-full border-b-2 border-black bg-transparent py-2 text-sm placeholder-neutral-300 focus:outline-none focus:border-accent transition-colors" />
      <p class="text-[10px] text-neutral-400 mt-1">Block height when this wallet was created. Syncing starts from this height.</p>
    </div>
    <button id="btn-import"
      class="w-full bg-black text-white text-[11px] font-semibold uppercase tracking-widest py-3.5 hover:bg-neutral-800 disabled:bg-neutral-200 disabled:text-neutral-400 transition-colors" disabled>
      Import &amp; Login
    </button>
    <button id="btn-back-login"
      class="w-full text-[11px] font-semibold uppercase tracking-widest text-neutral-400 hover:text-black py-3 transition-colors">
      Back
    </button>
    <p id="import-error" class="text-accent text-[11px] hidden"></p>
  </div>

  <!-- Wallet Info -->
  <div id="wallet-info" class="hidden mb-8">
    <div class="flex items-center justify-between mb-4">
      <p class="text-sm font-bold uppercase tracking-widest text-neutral-500">Wallet</p>
      <button id="btn-logout" class="text-[11px] font-semibold uppercase tracking-widest text-neutral-300 hover:text-black transition-colors">Logout</button>
    </div>
    <div class="space-y-3">
      <div>
        <label class="block text-[11px] font-semibold uppercase tracking-widest text-neutral-500 mb-1">Seed Phrase</label>
        <div id="seed-phrase" class="font-mono text-xs leading-relaxed break-all py-2 px-3 bg-neutral-50 blur-seed cursor-pointer"></div>
      </div>
      <div>
        <label class="block text-[11px] font-semibold uppercase tracking-widest text-neutral-500 mb-1">Spending Key</label>
        <div id="spending-key" class="font-mono text-[10px] leading-relaxed break-all py-2 px-3 bg-neutral-50"></div>
      </div>
      <div>
        <label class="block text-[11px] font-semibold uppercase tracking-widest text-neutral-500 mb-1">Full Viewing Key</label>
        <div id="viewing-key" class="font-mono text-[10px] leading-relaxed break-all py-2 px-3 bg-neutral-50"></div>
      </div>
      <div>
        <label class="block text-[11px] font-semibold uppercase tracking-widest text-neutral-500 mb-1">Unified Address</label>
        <div id="wallet-address" class="font-mono text-[10px] leading-relaxed break-all py-2 px-3 bg-neutral-50"></div>
      </div>
      <div>
        <label class="block text-[11px] font-semibold uppercase tracking-widest text-neutral-500 mb-1">Transparent Address</label>
        <div id="wallet-t-address" class="font-mono text-[10px] leading-relaxed break-all py-2 px-3 bg-neutral-50"></div>
      </div>
      <div id="birthday-row" class="hidden">
        <label class="block text-[11px] font-semibold uppercase tracking-widest text-neutral-500 mb-1">Birthday Height</label>
        <div class="flex gap-2 items-center">
          <input id="wallet-birthday" type="number" min="0" step="1"
            class="flex-1 font-mono text-[10px] leading-relaxed py-2 px-3 bg-neutral-50 tabular-nums border-b border-transparent focus:border-accent focus:outline-none transition-colors" />
          <button id="btn-save-birthday" class="text-[10px] font-semibold uppercase tracking-widest text-neutral-300 hover:text-black transition-colors shrink-0">Save</button>
        </div>
      </div>
      <div>
        <label class="block text-[11px] font-semibold uppercase tracking-widest text-neutral-500 mb-1">Tatum API Key</label>
        <div class="flex gap-2 items-center">
          <input id="rpc-api-key" type="text" placeholder="Enter your Tatum API key"
            class="flex-1 border-b border-neutral-200 bg-transparent py-1.5 text-[10px] font-mono placeholder-neutral-300 focus:outline-none focus:border-accent transition-colors" />
          <button id="btn-save-rpc" class="text-[10px] font-semibold uppercase tracking-widest text-neutral-300 hover:text-black transition-colors shrink-0">Save</button>
        </div>
        <p id="rpc-status" class="text-[10px] text-neutral-400 mt-1"></p>
      </div>
    </div>
  </div>

  <!-- Transactions -->
  <div id="tx-section" class="hidden">
    <p class="text-sm font-bold uppercase tracking-widest text-neutral-500 mb-3">Transactions</p>

    <!-- Lookup -->
    <div class="mb-4">
      <div class="flex gap-2 items-center">
        <input id="lookup-txid" type="text" placeholder="Paste txid to lookup"
          class="flex-1 border-b border-neutral-200 bg-transparent py-1.5 text-[10px] font-mono placeholder-neutral-300 focus:outline-none focus:border-accent transition-colors" />
        <button id="btn-lookup" class="text-[10px] font-semibold uppercase tracking-widest text-neutral-300 hover:text-black transition-colors shrink-0">Check</button>
      </div>
      <p id="lookup-result" class="text-[10px] font-mono text-neutral-500 mt-1 whitespace-pre-wrap break-all"></p>
    </div>

    <!-- Scan -->
    <div class="mb-4 space-y-2">
      <div class="flex gap-2 items-center">
        <label class="text-[10px] font-semibold uppercase tracking-widest text-neutral-500 shrink-0 w-10">From</label>
        <input id="scan-from" type="number" min="0" step="1" placeholder="start block"
          class="flex-1 border-b border-neutral-200 bg-transparent py-1 text-[10px] font-mono tabular-nums placeholder-neutral-300 focus:outline-none focus:border-accent transition-colors" />
        <label class="text-[10px] font-semibold uppercase tracking-widest text-neutral-500 shrink-0 w-6">To</label>
        <input id="scan-to" type="number" min="0" step="1" placeholder="tip"
          class="flex-1 border-b border-neutral-200 bg-transparent py-1 text-[10px] font-mono tabular-nums placeholder-neutral-300 focus:outline-none focus:border-accent transition-colors" />
      </div>
      <div class="flex items-center gap-2 text-[10px] text-neutral-400 tabular-nums">
        <svg id="sync-icon" class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <span id="sync-status" class="flex-1"></span>
        <button id="btn-sync" class="text-[10px] font-semibold uppercase tracking-widest text-neutral-300 hover:text-black transition-colors">Sync</button>
      </div>
    </div>

    <!-- List -->
    <div id="tx-list">
      <p class="text-sm text-neutral-300 py-6 text-center">No transactions yet</p>
    </div>
  </div>

</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
